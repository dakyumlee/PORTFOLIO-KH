<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmography - Admin</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <div class="admin-hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></div>
        <aside class="admin-sidebar">
            <div class="admin-logo">KH Admin</div>
            <ul class="admin-nav">
                <li><a href="/admin"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>Dashboard</a></li>
                <li><a href="/admin/profile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>Profile</a></li>
                <li><a href="/admin/filmography" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="2"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line></svg>Filmography</a></li>
                <li><a href="/admin/gallery"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>Gallery</a></li>
                <li><a href="/admin/videos"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2"></rect></svg>Videos</a></li>
                <li><a href="/" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>View Site</a></li>
                <li><a href="/admin/logout"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>Logout</a></li>
            </ul>
        </aside>
        <main class="admin-main">
            <div class="admin-header"><h1 th:text="${filmography.id != null ? 'Edit Filmography' : 'New Filmography'}"></h1></div>
            <form th:action="@{/admin/filmography}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:field="*{filmography.id}">
                <input type="hidden" th:field="*{filmography.posterUrl}">
                <input type="hidden" th:field="*{filmography.displayOrder}">
                <div class="card">
                    <h2 class="card-title">Details</h2>
                    <div class="form-group"><label for="title">Title *</label><input type="text" id="title" name="title" class="form-control" th:value="${filmography.title}" required></div>
                    <div class="form-group"><label for="year">Year</label><input type="text" id="year" name="year" class="form-control" th:value="${filmography.year}" placeholder="2024"></div>
                    <div class="form-group"><label for="role">Role</label><input type="text" id="role" name="role" class="form-control" th:value="${filmography.role}" placeholder="감독, 촬영, 편집 등"></div>
                    <div class="form-group"><label for="director">Director</label><input type="text" id="director" name="director" class="form-control" th:value="${filmography.director}"></div>
                    <div class="form-group"><label for="description">Description</label><textarea id="description" name="description" class="form-control" th:text="${filmography.description}"></textarea></div>
                </div>
                <div class="card">
                    <h2 class="card-title">Poster</h2>
                    <div class="form-group">
                        <label for="posterImage">Upload</label>
                        <input type="file" id="posterImage" name="posterImage" class="form-control" accept="image/*">
                        <p class="form-hint">Recommended: 2:3 ratio</p>
                        <div th:if="${filmography.posterUrl}" class="current-image"><img th:src="${filmography.posterUrl}" alt=""></div>
                    </div>
                </div>
                <div style="display:flex;gap:12px;flex-wrap:wrap;">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a href="/admin/filmography" class="btn">Cancel</a>
                </div>
            </form>
        </main>
    </div>
    <script>function toggleSidebar(){document.querySelector('.admin-sidebar').classList.toggle('active');document.querySelector('.admin-hamburger').classList.toggle('active');}</script>
</body>
</html>
