<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Admin</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <div class="admin-hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></div>
        <aside class="admin-sidebar">
            <div class="admin-logo">KH Admin</div>
            <ul class="admin-nav">
                <li><a href="/admin"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>Dashboard</a></li>
                <li><a href="/admin/profile"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>Profile</a></li>
                <li><a href="/admin/filmography"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="2"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line></svg>Filmography</a></li>
                <li><a href="/admin/gallery" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>Gallery</a></li>
                <li><a href="/admin/videos"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2"></rect></svg>Videos</a></li>
                <li><a href="/" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>View Site</a></li>
                <li><a href="/admin/logout"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>Logout</a></li>
            </ul>
        </aside>
        <main class="admin-main">
            <div class="admin-header">
                <h1>Gallery</h1>
                <div class="admin-header-actions"><a href="/admin/gallery/new" class="btn btn-primary">Add New</a></div>
            </div>
            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
            <div class="card">
                <!-- Desktop Table -->
                <div class="table-container">
                    <table class="table" th:if="${not #lists.isEmpty(gallery)}">
                        <thead><tr><th>Image</th><th>Title</th><th>Actions</th></tr></thead>
                        <tbody>
                            <tr th:each="item : ${gallery}">
                                <td><img th:if="${item.thumbnailUrl != null}" th:src="${item.thumbnailUrl}" class="table-image" alt=""><img th:if="${item.thumbnailUrl == null and item.imageUrl != null}" th:src="${item.imageUrl}" class="table-image" alt=""></td>
                                <td th:text="${item.title ?: '(No title)'}"></td>
                                <td><div class="table-actions"><a th:href="@{/admin/gallery/{id}(id=${item.id})}" class="btn btn-sm">Edit</a><form th:action="@{/admin/gallery/{id}/delete(id=${item.id})}" method="post" style="display:inline;" onsubmit="return confirm('삭제?');"><button type="submit" class="btn btn-sm btn-danger">Delete</button></form></div></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <!-- Mobile Cards -->
                <div class="mobile-card-list" th:if="${not #lists.isEmpty(gallery)}">
                    <div class="mobile-card-item" th:each="item : ${gallery}">
                        <div class="mobile-card-thumb">
                            <img th:if="${item.thumbnailUrl != null}" th:src="${item.thumbnailUrl}" alt="">
                            <img th:if="${item.thumbnailUrl == null and item.imageUrl != null}" th:src="${item.imageUrl}" alt="">
                        </div>
                        <div class="mobile-card-body">
                            <div class="mobile-card-title" th:text="${item.title ?: '(No title)'}"></div>
                            <div class="mobile-card-actions">
                                <a th:href="@{/admin/gallery/{id}(id=${item.id})}" class="btn btn-sm">Edit</a>
                                <form th:action="@{/admin/gallery/{id}/delete(id=${item.id})}" method="post" style="flex:1;" onsubmit="return confirm('삭제?');"><button type="submit" class="btn btn-sm btn-danger" style="width:100%;">Delete</button></form>
                            </div>
                        </div>
                    </div>
                </div>
                <div th:if="${#lists.isEmpty(gallery)}" class="empty-state"><p>등록된 갤러리가 없습니다.</p></div>
            </div>
        </main>
    </div>
    <script>function toggleSidebar(){document.querySelector('.admin-sidebar').classList.toggle('active');document.querySelector('.admin-hamburger').classList.toggle('active');}</script>
</body>
</html>
