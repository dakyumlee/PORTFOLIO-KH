<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Admin</title>
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <div class="admin-hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></div>
        <aside class="admin-sidebar">
            <div class="admin-logo">KH Admin</div>
            <ul class="admin-nav">
                <li><a href="/admin"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>Dashboard</a></li>
                <li><a href="/admin/profile" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>Profile</a></li>
                <li><a href="/admin/filmography"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="2"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line></svg>Filmography</a></li>
                <li><a href="/" target="_blank"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>View Site</a></li>
                <li><a href="/admin/logout"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>Logout</a></li>
            </ul>
        </aside>
        <main class="admin-main">
            <div class="admin-header"><h1>Edit Profile</h1></div>
            <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
            <form th:action="@{/admin/profile}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:field="*{profile.id}">
                <div class="card">
                    <h2 class="card-title">Basic Information</h2>
                    <div class="form-group"><label for="name">Name</label><input type="text" id="name" name="name" class="form-control" th:value="${profile.name}" required></div>
                    <div class="form-group"><label for="tagline">Tagline</label><input type="text" id="tagline" name="tagline" class="form-control" th:value="${profile.tagline}" placeholder="한 줄 소개"></div>
                    <div class="form-group"><label for="bio">Bio</label><textarea id="bio" name="bio" class="form-control" th:text="${profile.bio}" placeholder="자기 소개"></textarea></div>
                </div>
                <div class="card">
                    <h2 class="card-title">Contact</h2>
                    <div class="form-group"><label for="email">Email</label><input type="email" id="email" name="email" class="form-control" th:value="${profile.email}" placeholder="contact@example.com"></div>
                    <div class="form-group"><label for="instagram">Instagram</label><input type="text" id="instagram" name="instagram" class="form-control" th:value="${profile.instagram}" placeholder="username (@ 제외)"></div>
                </div>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </form>
        </main>
    </div>
    <script>function toggleSidebar(){document.querySelector('.admin-sidebar').classList.toggle('active');document.querySelector('.admin-hamburger').classList.toggle('active');}</script>
</body>
</html>
